<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najar · Deal Intelligence</title>
<style>
  /* ── Reset & base ───────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E2DFDA;
    --border2: #CBC8C2;
    --text: #1A1917;
    --text2: #5C5A56;
    --text3: #9A9893;
    --accent: #185FA5;
    --accent-light: #E6F1FB;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --r: 8px;
    --r-lg: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  html { font-size: 14px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky; top: 0; z-index: 100;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.3px; color: var(--text); }
  .brand-sub { font-size: 12px; color: var(--text3); font-weight: 400; }
  .live-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 9px;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #639922; }
  .main { flex: 1; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* ── Tab bar ─────────────────────────────────────────────── */
  .tabs-wrap {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
  }
  .tabs {
    display: flex; gap: 2px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 3px;
  }
  .tab {
    padding: 5px 13px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; background: transparent;
    color: var(--text2); font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .tab.on {
    background: var(--surface); color: var(--text);
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .deal-switcher { display: flex; gap: 6px; flex-wrap: wrap; }
  .deal-btn {
    padding: 5px 12px; border-radius: var(--r); font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-family: inherit; transition: all .15s;
  }
  .deal-btn.on { background: var(--text); color: #fff; border-color: var(--text); }

  /* ── Panels ──────────────────────────────────────────────── */
  .pane { display: none; }
  .pane.on { display: block; }

  /* ── KPI row ─────────────────────────────────────────────── */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; box-shadow: var(--shadow); }
  .kpi-val { font-size: 22px; font-weight: 600; line-height: 1; margin-bottom: 4px; letter-spacing: -.5px; }
  .kpi-label { font-size: 11px; color: var(--text2); }
  .kpi-note { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .kpi-val.r { color: var(--red); } .kpi-val.o { color: var(--amber); } .kpi-val.g { color: var(--green); }

  /* ── Card ────────────────────────────────────────────────── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 16px 20px; margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card-title { font-size: 10px; font-weight: 600; color: var(--text2); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 12px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .three { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }

  /* ── Pills ───────────────────────────────────────────────── */
  .pill { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; margin: 2px 2px 0 0; }
  .pill.r { background: var(--red-light); color: var(--red); }
  .pill.o { background: var(--amber-light); color: var(--amber); }
  .pill.g { background: var(--green-light); color: var(--green); }
  .pill.b { background: var(--accent-light); color: var(--accent); }
  .pill.p { background: var(--purple-light); color: var(--purple); }
  .pill.gray { background: var(--surface2); color: var(--text2); }

  /* ── Deal row ────────────────────────────────────────────── */
  .deal-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .deal-row:last-child { border-bottom: none; }
  .bar3 { width: 3px; border-radius: 2px; align-self: stretch; min-height: 32px; flex-shrink: 0; }
  .deal-body { flex: 1; min-width: 0; }
  .deal-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .deal-meta { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
  .deal-amt { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; flex-shrink: 0; }

  /* ── Stat row ────────────────────────────────────────────── */
  .srow { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .srow:last-child { border-bottom: none; }
  .sl { font-size: 11px; color: var(--text2); } .sv { font-size: 11px; font-weight: 600; color: var(--text); }

  /* ── Progress bar ────────────────────────────────────────── */
  .pbar { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .pbl { font-size: 11px; color: var(--text2); width: 130px; flex-shrink: 0; }
  .pbb { flex: 1; height: 5px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
  .pbf { height: 5px; border-radius: 3px; }
  .pbv { font-size: 11px; font-weight: 600; width: 36px; text-align: right; flex-shrink: 0; }

  /* ── MEDDPICC ────────────────────────────────────────────── */
  .mrow { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .mrow:last-child { border-bottom: none; }
  .ml { font-size: 11px; font-weight: 700; width: 14px; color: var(--text2); flex-shrink: 0; }
  .mn { font-size: 11px; color: var(--text2); width: 110px; flex-shrink: 0; }
  .mv { font-size: 11px; color: var(--text); flex: 1; line-height: 1.4; }
  .ms { font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 6px; flex-shrink: 0; }
  .ms.g { background: var(--green-light); color: var(--green); }
  .ms.o { background: var(--amber-light); color: var(--amber); }
  .ms.r { background: var(--red-light); color: var(--red); }

  /* ── Persona layout ──────────────────────────────────────── */
  .persona-layout { display: grid; grid-template-columns: 200px 1fr; gap: 14px; }
  .plist { display: flex; flex-direction: column; gap: 6px; }
  .pcard {
    border: 1px solid var(--border); border-radius: var(--r-lg); padding: 12px;
    cursor: pointer; background: var(--surface); transition: all .15s; box-shadow: var(--shadow);
  }
  .pcard:hover { border-color: var(--border2); }
  .pcard.on { background: var(--surface2); border-color: var(--border2); }
  .av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .pcard-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .pcn { font-size: 12px; font-weight: 600; color: var(--text); }
  .pct { font-size: 10px; color: var(--text2); line-height: 1.3; }
  .ph { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .av-lg { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .ph-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .ph-title { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .ph-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
  .sbanner { border-radius: var(--r); padding: 8px 12px; margin-bottom: 12px; font-size: 11px; line-height: 1.4; font-weight: 500; }
  .sbanner.warn { background: var(--amber-light); color: var(--amber); }
  .sbanner.danger { background: var(--red-light); color: var(--red); }
  .sbanner.info { background: var(--accent-light); color: var(--accent); }
  .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .pblock { background: var(--surface2); border-radius: var(--r); padding: 10px; }
  .pblabel { font-size: 9px; font-weight: 700; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
  .pbval { font-size: 11px; color: var(--text); line-height: 1.5; }
  .sitrow { display: flex; gap: 8px; margin-bottom: 8px; }
  .si-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .si-label { font-size: 10px; font-weight: 700; color: var(--text2); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .04em; }
  .si-text { font-size: 11px; color: var(--text); line-height: 1.5; }
  .msg-item { display: flex; gap: 6px; margin-bottom: 7px; }
  .msg-num { font-size: 10px; font-weight: 700; color: var(--text3); width: 14px; flex-shrink: 0; padding-top: 2px; }
  .msg-text { font-size: 11px; color: var(--text); line-height: 1.5; background: var(--surface2); border-radius: var(--r); padding: 8px 10px; flex: 1; border-left: 2px solid var(--accent); }
  .avoid-item { display: flex; gap: 6px; margin-bottom: 5px; }
  .avoid-x { color: var(--red); font-size: 11px; flex-shrink: 0; margin-top: 1px; font-weight: 700; }
  .avoid-text { font-size: 11px; color: var(--text); line-height: 1.4; }
  .q-item { display: flex; gap: 6px; margin-bottom: 7px; }
  .q-num { font-size: 11px; font-weight: 700; color: var(--text3); width: 16px; flex-shrink: 0; }
  .q-q { font-size: 11px; color: var(--text); line-height: 1.5; }
  .q-why { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .signal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .sbuy { background: var(--green-light); border-radius: var(--r); padding: 10px; }
  .srisk { background: var(--red-light); border-radius: var(--r); padding: 10px; }
  .sblabel { font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
  .sbuy .sblabel { color: var(--green); } .srisk .sblabel { color: var(--red); }
  .sitem { font-size: 11px; color: var(--text); margin-bottom: 4px; display: flex; gap: 5px; line-height: 1.4; }
  .dyn { background: var(--surface2); border-radius: var(--r); padding: 12px; margin-top: 6px; }
  .dynrow { display: flex; gap: 8px; margin-bottom: 6px; }
  .dynrow:last-child { margin-bottom: 0; }
  .dynlabel { font-size: 10px; font-weight: 700; color: var(--text2); width: 90px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .04em; padding-top: 1px; }
  .dyntext { font-size: 11px; color: var(--text); line-height: 1.5; flex: 1; }

  /* ── Coach ───────────────────────────────────────────────── */
  .coach-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .coach-item:last-child { border-bottom: none; }
  .cnum { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text2); flex-shrink: 0; margin-top: 1px; }
  .cwho { font-size: 12px; font-weight: 700; color: var(--text); }
  .cdeal { font-size: 10px; color: var(--text2); margin-top: 1px; }
  .cobs { font-size: 11px; color: var(--text); margin-top: 5px; line-height: 1.5; }
  .cact { font-size: 10px; color: var(--accent); margin-top: 3px; font-weight: 500; }

  /* ── Loading / error ─────────────────────────────────────── */
  .loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    z-index: 1000;
  }
  .loading-screen.hidden { display: none; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text2); }
  .loading-step { font-size: 11px; color: var(--text3); }
  .error-banner {
    background: var(--red-light); border: 1px solid var(--red);
    border-radius: var(--r); padding: 12px 16px; margin-bottom: 16px;
    font-size: 12px; color: var(--red); line-height: 1.5; display: none;
  }

  /* ── Timeline ────────────────────────────────────────────── */
  .tl-item { display: flex; gap: 8px; margin-bottom: 8px; }
  .tl-date { font-size: 10px; color: var(--text3); width: 64px; flex-shrink: 0; padding-top: 2px; }
  .tl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .tl-ev { font-size: 11px; font-weight: 600; color: var(--text); }
  .tl-de { font-size: 10px; color: var(--text2); margin-top: 1px; }

  /* ── Util ────────────────────────────────────────────────── */
  .sec-title { font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 8px; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .empty { text-align: center; padding: 32px; color: var(--text3); font-size: 13px; }
  select { font-size: 12px; padding: 5px 9px; border-radius: var(--r); border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; margin-bottom: 12px; width: 100%; }
  button.cta { font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: var(--r); cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; transition: all .15s; }
  button.cta:hover { background: var(--text); color: #fff; border-color: var(--text); }
  button.cta.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.cta.primary:hover { background: #0f4a82; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .main { padding: 14px; }
    .topbar { padding: 0 14px; }
    .two, .pgrid, .signal-grid { grid-template-columns: 1fr; }
    .persona-layout { grid-template-columns: 1fr; }
    .tabs { flex-wrap: wrap; }
    .three { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading deal intelligence…</div>
  <div class="loading-step" id="load-step">Connecting to Notion</div>
</div>

<div class="app" id="app" style="display:none">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-name">Najar</div>
      <div class="brand-sub">Deal Intelligence</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="live-pill"><div class="live-dot"></div><span id="last-refresh">Live · Notion</span></div>
      <div class="tabs">
        <button class="tab on" onclick="sw('csuite',this)">C-suite</button>
        <button class="tab" onclick="sw('analytics',this)">Analytics</button>
        <button class="tab" onclick="sw('vpsales',this)">VP Sales</button>
        <button class="tab" onclick="sw('presales',this)">Pre-sales</button>
        <button class="tab" onclick="sw('ae',this)">AE · Personas</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="error-banner" id="error-banner"></div>

    <!-- ═══ C-SUITE ═══ -->
    <div id="pane-csuite" class="pane on">
      <div class="kpis" id="cs-kpis"></div>
      <div class="two">
        <div class="card"><div class="card-title">Deals at risk</div><div id="cs-deals"></div></div>
        <div class="card"><div class="card-title">Strategic signals</div><div id="cs-signals"></div></div>
      </div>
      <div class="card"><div class="card-title">Decisions needed this week</div><div id="cs-decisions"></div></div>
    </div>

    <!-- ═══ ANALYTICS ═══ -->
    <div id="pane-analytics" class="pane">
      <div class="kpis" id="an-kpis"></div>
      <div class="card"><div class="card-title">Pipeline by stage</div><div id="an-funnel"></div></div>
      <div class="two">
        <div class="card"><div class="card-title">MEDDPICC completeness</div><div id="an-medd"></div></div>
        <div class="card"><div class="card-title">Cross-deal patterns</div><div id="an-patterns"></div></div>
      </div>
    </div>

    <!-- ═══ VP SALES ═══ -->
    <div id="pane-vpsales" class="pane">
      <div class="kpis" id="vp-kpis"></div>
      <div class="card"><div class="card-title">Coaching priorities — before the next M1s</div><div id="vp-coaching"></div></div>
    </div>

    <!-- ═══ PRE-SALES ═══ -->
    <div id="pane-presales" class="pane">
      <select id="ps-sel" onchange="renderPS()"></select>
      <div id="ps-body"></div>
    </div>

    <!-- ═══ AE · PERSONAS ═══ -->
    <div id="pane-ae" class="pane">
      <div class="deal-switcher" id="ae-switcher" style="margin-bottom:14px"></div>
      <div class="persona-layout">
        <div class="plist" id="plist"></div>
        <div id="pdetail"></div>
      </div>
    </div>

  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────
   CONFIG — set your API key in the URL hash or here directly
   Usage: najar-dashboard.html#key=sk-ant-...
   ──────────────────────────────────────────────────────────── */
const NOTION_DB = 'd95f90bb-ffd2-4df2-84f4-5b0a280aab16';
const NOTION_MCP = 'https://mcp.notion.com/mcp';
const MODEL = 'claude-sonnet-4-6';

function getApiKey() {
  const hash = location.hash.replace('#','');
  const m = hash.match(/key=([^&]+)/);
  if (m) return m[1];
  return window.__NAJAR_API_KEY || null;
}

/* ─────────────────────────────────────────────────────────────
   STATE
   ──────────────────────────────────────────────────────────── */
let deals = [];
let currentDeal = null;
let currentPersona = null;

/* ─────────────────────────────────────────────────────────────
   BOOT
   ──────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', boot);

async function boot() {
  const key = getApiKey();
  if (!key) {
    showError('No API key found. Add your Anthropic API key to the URL: najar-dashboard.html#key=sk-ant-YOUR_KEY');
    hideLoading();
    return;
  }
  try {
    setStep('Reading deal pages from Notion…');
    deals = await fetchDeals(key);
    if (deals.length === 0) {
      showError('No deals found in the Notion database. Make sure the Deal Inception Agent has created at least one deal page.');
      hideLoading();
      return;
    }
    currentDeal = deals[0].id;
    currentPersona = deals[0].personas?.[0]?.id || null;
    setStep('Rendering dashboard…');
    renderAll();
    hideLoading();
    document.getElementById('app').style.display = 'flex';
    document.getElementById('last-refresh').textContent = 'Live · ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    showError('Error loading data: ' + e.message);
    hideLoading();
    console.error(e);
  }
}

/* ─────────────────────────────────────────────────────────────
   API — fetch all deals via Claude + Notion MCP
   ──────────────────────────────────────────────────────────── */
async function fetchDeals(key) {
  const systemPrompt = `You are a data extraction agent. Your job is to read Notion deal pages and return structured JSON.

You have access to Notion via MCP. The deal pages database collection ID is: ${NOTION_DB}

For each deal page you find, extract:
- id: the Notion page ID
- name: company name
- amount: deal amount in euros (number)
- stage: current stage (M1, Discovery, Demo, Business Case, etc.)
- ae: AE name
- bdr: BDR name  
- nextMeeting: next meeting date if known
- pe_flag: PE flag level (RED/AMBER/GREEN/NONE)
- pe_fund: PE fund name if known
- health_score: deal health score out of 5 if scored by Deal Analyzer
- meddpicc_score: MEDDPICC completeness percentage if available
- flags: array of {label, severity} where severity is r/o/g/b
- key_insight: 1-2 sentence strategic insight unique to this deal
- meddpicc: array of {letter, name, value, status} where status is acquired/partial/missing
- personas: array of persona objects each with:
  - id: unique string id (e.g. "royer", "herman")
  - initials: 2 letter initials
  - avatarBg: hex color for avatar background
  - avatarColor: hex color for avatar text
  - name: full name
  - title: job title
  - tenure: time in role
  - role: their buying role (Champion, Economic Buyer, etc.)
  - profile: personality type
  - statusType: info/warn/danger
  - statusLabel: one-line status
  - tags: array of {label, cls} where cls is r/o/g/b/p/gray
  - sit_heritage: what they inherited
  - sit_pressure: pressure they face
  - sit_victory: quick win they seek
  - sit_risk: risk of engaging
  - type: personality type detail
  - langage: language patterns they use
  - motive: what motivates them
  - mefiant: what makes them suspicious
  - posture: recommended sales posture
  - messages: array of 3 confidence-building messages (strings)
  - avoids: array of 2-3 things never to say
  - questions: array of {q, why} recommended questions
  - buy_signals: array of strings
  - risk_signals: array of strings
  - dynamics: string about contact dynamics or null
- contact_dynamics: {relation, influence, strategy}
- timeline: array of {date, dot_color, event, detail}
- coaching_obs: coaching observation for VP Sales
- coaching_action: recommended VP Sales action

IMPORTANT: Read the actual content of each deal page thoroughly. Extract real data, not placeholders. If a field is not available in the page, use null or an empty array.

Return ONLY a valid JSON array of deal objects. No markdown, no explanation, no backticks. Just the raw JSON array starting with [ and ending with ].`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 8000,
      system: systemPrompt,
      messages: [{ role: 'user', content: `Read all deal pages from the Notion database collection ${NOTION_DB} and return the structured JSON array. Read each page fully before extracting data.` }],
      mcp_servers: [{ type: 'url', url: NOTION_MCP, name: 'notion' }]
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();

  // Extract text from response
  const textBlocks = data.content.filter(b => b.type === 'text').map(b => b.text).join('');

  // Parse JSON — strip any accidental markdown fences
  const clean = textBlocks.replace(/```json|```/g, '').trim();
  const start = clean.indexOf('[');
  const end = clean.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('Could not parse deal data from API response');

  return JSON.parse(clean.slice(start, end + 1));
}

/* ─────────────────────────────────────────────────────────────
   RENDER — all tabs
   ──────────────────────────────────────────────────────────── */
function renderAll() {
  renderCSuite();
  renderAnalytics();
  renderVPSales();
  renderPS();
  renderAE();
}

/* ── C-SUITE ─────────────────────────────────────────────── */
function renderCSuite() {
  const total = deals.reduce((s,d) => s + (d.amount||0), 0);
  const redDeals = deals.filter(d => d.pe_flag === 'RED' || (d.health_score && d.health_score < 3));
  const atRisk = redDeals.reduce((s,d) => s + (d.amount||0), 0);
  const avgHealth = deals.filter(d=>d.health_score).reduce((s,d,_,a)=>s+d.health_score/a.length,0);

  document.getElementById('cs-kpis').innerHTML = kpi('€'+fmt(total), 'Pipeline analysé', deals.length+' deal'+(deals.length>1?'s':'')+' with full analysis')
    + kpi('€'+fmt(atRisk), 'Revenue at risk', 'PE RED or health <3', atRisk>0?'r':'g')
    + kpi(avgHealth ? avgHealth.toFixed(1)+'/5' : 'N/A', 'Avg deal health', 'Target 3.5+', avgHealth && avgHealth<3?'r':avgHealth&&avgHealth<3.5?'o':'g')
    + kpi(deals.length, 'Deals tracked', 'By AI agent pipeline', '');

  document.getElementById('cs-deals').innerHTML = deals.map(d => {
    const col = d.pe_flag==='RED'?'#A32D2D': d.pe_flag==='AMBER'?'#854F0B':'#639922';
    const flags = (d.flags||[]).slice(0,3).map(f=>`<span class="pill ${f.severity}">${f.label}</span>`).join('');
    return `<div class="deal-row">
      <div class="bar3" style="background:${col}"></div>
      <div class="deal-body">
        <div class="deal-name">${d.name} <span style="font-weight:400;font-size:11px;color:var(--text2)">· ${d.stage||'M1'}</span></div>
        <div class="deal-meta">${d.ae||'AE TBC'} · ${d.bdr||'BDR TBC'}${d.nextMeeting?' · Next: '+d.nextMeeting:''}</div>
        <div style="margin-top:4px">${flags}</div>
      </div>
      <div class="deal-amt">€${fmt(d.amount)}</div>
    </div>`;
  }).join('');

  // Strategic signals — derive from deal data
  const signals = [];
  deals.forEach(d => {
    if (d.key_insight) signals.push({ label: d.name+' — '+d.key_insight.slice(0,80)+(d.key_insight.length>80?'…':''), val: '🟢 Open', valCls: 'g' });
    if (d.pe_flag==='RED') signals.push({ label: d.name+' — PE RED flag ('+d.pe_fund+')', val: 'Watch', valCls: 'r' });
  });
  const ebOk = deals.filter(d=>d.meddpicc?.find(m=>m.letter==='E'&&m.status==='acquired')).length;
  signals.push({ label: 'Economic Buyers reachable', val: ebOk+'/'+deals.length, valCls: ebOk===deals.length?'g':'r' });

  document.getElementById('cs-signals').innerHTML = signals.map(s =>
    `<div class="srow"><div class="sl">${s.label}</div><div class="sv" style="color:var(--${s.valCls==='r'?'red':s.valCls==='o'?'amber':'green'})">${s.val}</div></div>`
  ).join('') || '<div class="empty">No signals — add more deal data</div>';

  // Decisions = coaching actions
  document.getElementById('cs-decisions').innerHTML = deals.map(d => {
    if (!d.coaching_action) return '';
    return `<div class="deal-row"><div class="bar3" style="background:var(--red)"></div><div class="deal-body"><div class="deal-name">${d.name} — ${d.coaching_obs||'Action required'}</div><div class="deal-meta">${d.coaching_action}</div></div></div>`;
  }).join('') || '<div class="empty">No urgent decisions flagged</div>';
}

/* ── ANALYTICS ───────────────────────────────────────────── */
function renderAnalytics() {
  const totalCalls = deals.reduce((s,d)=>s+(d.call_count||0),0);
  const meddScores = deals.filter(d=>d.meddpicc_score!=null).map(d=>d.meddpicc_score);
  const avgMedd = meddScores.length ? Math.round(meddScores.reduce((a,b)=>a+b,0)/meddScores.length) : null;
  const total = deals.reduce((s,d)=>s+(d.amount||0),0);

  document.getElementById('an-kpis').innerHTML =
    kpi(deals.length, 'Deals analysed', 'By AI agent pipeline')
    + kpi(totalCalls||'—', 'Calls catalogued', 'Across all deals')
    + kpi(avgMedd!=null?avgMedd+'%':'—', 'MEDDPICC avg', 'Across scored deals', avgMedd&&avgMedd<50?'r':avgMedd&&avgMedd<70?'o':'g')
    + kpi('€'+fmt(total), 'Total pipeline', deals.map(d=>d.name).join(' · '));

  // Funnel — group by stage
  const stages = ['M1','Discovery','Demo','Business Case','Pricing','Closed'];
  const stageMap = {};
  deals.forEach(d => {
    const s = d.stage||'M1';
    stageMap[s] = (stageMap[s]||0) + (d.amount||0);
  });
  const maxAmt = Math.max(...Object.values(stageMap), 1);
  document.getElementById('an-funnel').innerHTML = stages.map(s => {
    const amt = stageMap[s]||0;
    const pct = Math.round(amt/maxAmt*100);
    return `<div class="pbar"><div class="pbl">${s}</div><div class="pbb"><div class="pbf" style="width:${pct}%;background:${amt>0?'#378ADD':'var(--border)'}"></div></div><div class="pbv" style="color:${amt>0?'var(--accent)':'var(--text3)'}">${amt>0?'€'+fmt(amt):'€0'}</div></div>`;
  }).join('');

  // MEDDPICC — first scored deal
  const scored = deals.find(d=>d.meddpicc?.length);
  document.getElementById('an-medd').innerHTML = scored ? scored.meddpicc.map(m =>
    `<div class="mrow"><div class="ml">${m.letter}</div><div class="mn">${m.name}</div><div class="mv">${m.value||'—'}</div><div class="ms ${m.status==='acquired'?'g':m.status==='partial'?'o':'r'}">${m.status==='acquired'?'Acquired':m.status==='partial'?'Partial':'Missing'}</div></div>`
  ).join('') : '<div class="empty">Run the Deal Analyzer to see MEDDPICC data</div>';

  // Patterns
  const patterns = [
    { label: 'Single threading', val: deals.filter(d=>d.personas?.length<=1).length+'/'+deals.length, bad: true },
    { label: 'EB identified', val: deals.filter(d=>d.meddpicc?.find(m=>m.letter==='E'&&m.status!=='missing')).length+'/'+deals.length, bad: false },
    { label: 'Next step dated', val: deals.filter(d=>d.nextMeeting).length+'/'+deals.length, bad: false },
  ];
  document.getElementById('an-patterns').innerHTML = patterns.map(p => {
    const [num,den] = p.val.split('/').map(Number);
    const pct = den>0?Math.round(num/den*100):0;
    const col = p.bad ? (pct<50?'#639922':'#E24B4A') : (pct>60?'#639922':'#E24B4A');
    return `<div class="pbar"><div class="pbl">${p.label}</div><div class="pbb"><div class="pbf" style="width:${pct}%;background:${col}"></div></div><div class="pbv" style="color:${col}">${p.val}</div></div>`;
  }).join('');
}

/* ── VP SALES ────────────────────────────────────────────── */
function renderVPSales() {
  const ebOk = deals.filter(d=>d.meddpicc?.find(m=>m.letter==='E'&&m.status==='acquired')).length;
  const aeOk = deals.filter(d=>d.ae&&d.ae!=='Non assigné').length;

  document.getElementById('vp-kpis').innerHTML =
    kpi(aeOk+'/'+deals.length, 'AEs assigned', '', aeOk<deals.length?'r':'g')
    + kpi(ebOk+'/'+deals.length, 'EBs reachable', '', ebOk<deals.length?'r':'g')
    + kpi(deals.filter(d=>d.health_score&&d.health_score>=3.5).length+'/'+deals.length, 'Deals healthy', 'Score ≥ 3.5', '')
    + kpi(deals.filter(d=>d.nextMeeting).length, 'M1s scheduled', 'With confirmed dates', '');

  document.getElementById('vp-coaching').innerHTML = deals.map((d,i) => {
    if (!d.coaching_obs) return '';
    return `<div class="coach-item">
      <div class="cnum">${i+1}</div>
      <div>
        <div class="cwho">${d.ae||'AE TBC'} — ${d.name} · €${fmt(d.amount)}</div>
        <div class="cdeal">${d.nextMeeting?'Next meeting: '+d.nextMeeting:'No meeting scheduled'}</div>
        <div class="cobs">${d.coaching_obs}</div>
        <div class="cact">→ ${d.coaching_action||'Verify readiness before next call'}</div>
      </div>
    </div>`;
  }).join('') || '<div class="empty">No coaching priorities flagged yet</div>';
}

/* ── PRE-SALES ───────────────────────────────────────────── */
function renderPS() {
  const sel = document.getElementById('ps-sel');
  if (sel.innerHTML === '') {
    sel.innerHTML = deals.map(d => `<option value="${d.id}">${d.name} — ${d.stage||'M1'} · €${fmt(d.amount)}${d.nextMeeting?' · '+d.nextMeeting:''}</option>`).join('');
  }
  const d = deals.find(x=>x.id===sel.value) || deals[0];
  if (!d) return;

  const flagsHtml = (d.flags||[]).map(f=>`<span class="pill ${f.severity}" style="padding:4px 9px" title="${f.label}">${f.label}</span>`).join('');
  const contactsHtml = (d.personas||[]).map(p =>
    `<div class="deal-row"><div class="deal-body"><div class="deal-name">${p.name} <span style="font-weight:400;font-size:11px;color:var(--text2)">· ${p.title}</span></div><div class="deal-meta">${p.tenure||''} · ${p.profile||''}</div></div><span class="pill b" style="white-space:nowrap">${p.role}</span></div>`
  ).join('');

  document.getElementById('ps-body').innerHTML = `
    <div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><div style="font-size:14px;font-weight:700;color:var(--text)">${d.name}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${d.stage||'M1'} · €${fmt(d.amount)}${d.ae?' · AE: '+d.ae:''}</div></div>
        ${d.nextMeeting?`<span class="pill r" style="padding:4px 9px">${d.nextMeeting}</span>`:''}
      </div>
      ${d.key_insight?`<div style="background:var(--surface2);border-radius:var(--r);padding:10px;margin-bottom:10px;font-size:11px;color:var(--text);line-height:1.6;border-left:3px solid var(--accent)">${d.key_insight}</div>`:''}
      <div class="sec-title">Flags</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${flagsHtml||'<span class="pill gray">No flags</span>'}</div>
      <div class="sec-title">Contacts</div>
      ${contactsHtml||'<div class="empty">No contacts yet</div>'}
    </div>`;
}

/* ── AE · PERSONAS ───────────────────────────────────────── */
function setDeal(id, btn) {
  document.querySelectorAll('#ae-switcher .deal-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  currentDeal = id;
  currentPersona = deals.find(d=>d.id===id)?.personas?.[0]?.id || null;
  renderAE();
}

function setPersona(id) {
  currentPersona = id;
  renderAE();
}

function renderAE() {
  // Build deal switcher
  const sw = document.getElementById('ae-switcher');
  sw.innerHTML = deals.map(d =>
    `<button class="deal-btn${d.id===currentDeal?' on':''}" onclick="setDeal('${d.id}',this)">${d.name} · €${fmt(d.amount)}</button>`
  ).join('');

  const deal = deals.find(d=>d.id===currentDeal) || deals[0];
  if (!deal) return;
  if (!currentPersona && deal.personas?.length) currentPersona = deal.personas[0].id;

  // Persona list
  document.getElementById('plist').innerHTML = (deal.personas||[]).map(p =>
    `<div class="pcard${p.id===currentPersona?' on':''}" onclick="setPersona('${p.id}')">
      <div class="pcard-top">
        <div class="av" style="background:${p.avatarBg||'#E6F1FB'};color:${p.avatarColor||'#185FA5'}">${p.initials||'?'}</div>
        <div><div class="pcn">${p.name}</div><div class="pct">${p.title}</div></div>
      </div>
      <div>${(p.tags||[]).map(t=>`<span class="pill ${t.cls}">${t.label}</span>`).join('')}</div>
    </div>`
  ).join('') || '<div class="empty">No personas yet — run Deal Inception Agent</div>';

  const p = (deal.personas||[]).find(x=>x.id===currentPersona);
  if (!p) { document.getElementById('pdetail').innerHTML = '<div class="empty">Select a contact</div>'; return; }

  const dy = deal.contact_dynamics;

  document.getElementById('pdetail').innerHTML = `
    <div class="ph">
      <div class="av-lg" style="background:${p.avatarBg||'#E6F1FB'};color:${p.avatarColor||'#185FA5'}">${p.initials||'?'}</div>
      <div>
        <div class="ph-name">${p.name}</div>
        <div class="ph-title">${p.title} · ${p.tenure||''}</div>
        <div class="ph-tags">${(p.tags||[]).map(t=>`<span class="pill ${t.cls}">${t.label}</span>`).join('')}<span class="pill gray">${p.role}</span></div>
      </div>
    </div>

    <div class="sbanner ${p.statusType||'info'}">${p.statusLabel||'Active contact'}</div>

    <div class="card" style="margin-bottom:8px">
      <div class="sec-title">Psychological profile</div>
      <div class="pgrid">
        <div class="pblock"><div class="pblabel">Type</div><div class="pbval">${p.type||'—'}</div></div>
        <div class="pblock"><div class="pblabel">Language</div><div class="pbval">${p.langage||'—'}</div></div>
        <div class="pblock"><div class="pblabel">Motivated by</div><div class="pbval">${p.motive||'—'}</div></div>
        <div class="pblock"><div class="pblabel">Suspicious of</div><div class="pbval">${p.mefiant||'—'}</div></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:8px">
      <div class="sec-title">Current situation</div>
      ${sitRow('🏢', 'What they inherited', p.sit_heritage)}
      ${sitRow('⚡', 'Pressure they face', p.sit_pressure)}
      ${sitRow('🏆', 'Quick win they seek', p.sit_victory)}
      ${sitRow('🛡️', 'Risk of engaging', p.sit_risk)}
    </div>

    <div class="card" style="margin-bottom:8px">
      <div class="sec-title">How to build confidence in Najar · Posture: ${p.posture||'Consultant'}</div>
      <div style="margin-bottom:10px">
        <div class="sec-title" style="margin-bottom:5px">Say this</div>
        ${(p.messages||[]).map((m,i)=>`<div class="msg-item"><div class="msg-num">${i+1}</div><div class="msg-text">${m}</div></div>`).join('')}
      </div>
      <div>
        <div class="sec-title" style="margin-bottom:5px">Never say this</div>
        ${(p.avoids||[]).map(a=>`<div class="avoid-item"><div class="avoid-x">✕</div><div class="avoid-text">${a}</div></div>`).join('')}
      </div>
    </div>

    ${p.questions?.length ? `<div class="card" style="margin-bottom:8px">
      <div class="sec-title">Recommended questions</div>
      ${p.questions.map((q,i)=>`<div class="q-item"><div class="q-num">${i+1}</div><div><div class="q-q">${q.q}</div><div class="q-why">${q.why}</div></div></div>`).join('')}
    </div>` : ''}

    ${(p.buy_signals?.length||p.risk_signals?.length) ? `<div class="signal-grid" style="margin-bottom:8px">
      <div class="sbuy"><div class="sblabel">Buy signals</div>${(p.buy_signals||[]).map(s=>`<div class="sitem"><span style="color:var(--green);font-weight:700;margin-right:4px">✓</span>${s}</div>`).join('')}</div>

      </div>
    </div>` : ''}

    ${deal.timeline?.length ? `<div class="card" style="margin-bottom:8px">
      <div class="sec-title">Deal timeline</div>
      ${deal.timeline.map(t=>`<div class="tl-item"><div class="tl-date">${t.date}</div><div style="display:flex;flex-direction:column;align-items:center"><div class="tl-dot" style="background:${t.dot_color||'var(--accent)'}"></div></div><div><div class="tl-ev">${t.event}</div><div class="tl-de">${t.detail}</div></div></div>`).join('')}
    </div>` : ''}`;
}

/* ─────────────────────────────────────────────────────────────
   HELPERS
   ──────────────────────────────────────────────────────────── */
function sw(id, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pane-'+id).classList.add('on');
}

function kpi(val, label, note='', cls='') {
  return `<div class="kpi"><div class="kpi-val ${cls}">${val}</div><div class="kpi-label">${label}</div>${note?`<div class="kpi-note">${note}</div>`:''}</div>`;
}

function sitRow(icon, label, text) {
  if (!text) return '';
  return `<div class="sitrow"><div class="si-icon">${icon}</div><div><div class="si-label">${label}</div><div class="si-text">${text}</div></div></div>`;
}

function fmt(n) {
  if (!n) return '0';
  if (n >= 1000) return Math.round(n/1000)+'K';
  return n.toString();
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('app').style.display = 'flex';
}

function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}

function setStep(text) {
  document.getElementById('load-step').textContent = text;
}
